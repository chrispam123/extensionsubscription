name: CD — production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment: production
    
    env:
      TF_VAR_env: "prod"
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_google_redirect_uri: ${{ secrets.GOOGLE_REDIRECT_URI }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "eu-west-1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Build Backend Lambda
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm prune --production
          npm run package:lambda

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false -reconfigure -backend-config=backend-prod.hcl

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -input=false

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -input=false -auto-approve

      - name: Smoke test (health)
        run: |
          set -euo pipefail
          URL="https://spslatrldf.execute-api.eu-west-1.amazonaws.com/api/v1/auth/callback"
          for i in {1..10}; do
            echo "Health check attempt $i..."
            if curl -s -I "$URL" | grep -q "HTTP/"; then
              echo "API is UP"
              exit 0
            fi
            sleep 10
          done
          echo "API is DOWN"
          exit 1
