
name: CI — infra

on:
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/ci-infra.yml'

permissions:
  contents: read

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Terraform Format
        working-directory: infra
        # Verifica si el código está bien indentado. Si no, falla.
        run: terraform fmt -check

      - name: Terraform Init
        working-directory: infra
        # TRUCO PROFESIONAL: -backend=false
        # No necesitamos conectarnos al S3 real para validar la sintaxis.
        # Esto permite que el CI corra sin necesitar credenciales de AWS.
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        # Comprueba que todos los recursos y módulos sean coherentes.
        run: terraform validate
